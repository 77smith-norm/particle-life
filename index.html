<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0f">
    <title>Particle Life</title>
    <style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background-color: #0a0a0f;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}
        #canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
#ui {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: auto;
    min-height: 60px;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 12px;
    padding-bottom: calc(8px + env(safe-area-inset-bottom));
    box-sizing: border-box;
    z-index: 10;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
}
/* Legend label */
        /* Button Row */
#ui-buttons {
    display: flex;
    justify-content: space-around;
    align-items: center;
    gap: 4px;
}
#ui-buttons button, .fan-top {
    min-width: 44px;
    min-height: 44px;
    padding: 6px 10px;
    font-size: 18px;
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
}
#ui-buttons button:hover, .fan-top:hover {
    background: rgba(255,255,255,0.25);
}
#ui-buttons button:active, .fan-top:active {
    transform: scale(0.95);
    background: rgba(255,255,255,0.35);
}
.btn-icon { font-size: 18px; line-height: 1; }
.btn-label { font-size: 10px; opacity: 0.7; line-height: 1; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

.fan-stack {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
}
.fan-stack .fan-top {
    min-width: 44px;
    min-height: 44px;
}
.fan-stack .fan-options {
    position: absolute;
    bottom: 100%;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding-bottom: 4px;
}
.fan-stack.open .fan-options {
    display: flex;
}
.fan-option {
    width: 160px;
    box-sizing: border-box;
    min-height: 44px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 8px;
    color: white;
    cursor: pointer;
    white-space: nowrap;
}
/* Species fan option — dot + label layout */
.fan-option.species-option {
    gap: 10px;
}
.species-dot-fan {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
    position: relative;
}
.species-dot-fan.species-off {
    opacity: 0.3;
}
.species-dot-fan.species-off::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 18px;
    height: 2px;
    background: rgba(255,255,255,0.6);
    transform: translate(-50%, -50%) rotate(-45deg);
}
.fan-option:hover, .fan-option:active {
    background: rgba(255,255,255,0.2);
}
.fan-option:disabled, .fan-option.disabled {
    opacity: 0.3;
    pointer-events: none;
}
        
        /* Hide fullscreen button on iOS (JS-controlled, see runtime check below) */
        
        /* Settings panel styles */
        #settings-panel {
            position: absolute;
            bottom: auto; /* Position from top instead */
            top: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 15px;
            box-sizing: border-box;
            z-index: 10;
            display: none;
            flex-direction: column;
            gap: 10px;
            max-height: 60vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        #settings-panel.active {
            display: flex;
        }
        .settings-section {
            margin-bottom: 15px;
        }
        .settings-section h3 {
            margin: 0 0 10px 0;
            font-size: 18px;
            cursor: pointer;
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .slider-label {
            min-width: 80px;
        }
        .slider-value {
            min-width: 50px;
            text-align: center;
            font-family: monospace;
        }
        input[type="range"] {
            flex: 1;
            height: 20px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
<div id="ui">
    <div id="ui-buttons">
        <div class="fan-stack" id="species-stack">
            <button class="fan-top" title="Species"><span class="btn-icon">🔴</span><span class="btn-label">Species</span></button>
            <div class="fan-options" id="species-dots"></div>
        </div>
        <div class="fan-stack" id="life-stack">
            <button class="fan-top" title="Life"><span class="btn-icon">🎲</span><span class="btn-label">Life</span></button>
            <div class="fan-options">
                <button class="fan-option" id="randomize" title="Randomize Rules"><span class="btn-icon">🎲</span> Randomize Rules</button>
                <button class="fan-option" id="settings-toggle" title="Settings"><span class="btn-icon">⚙️</span> Settings</button>
                <button class="fan-option" id="reset" title="New Simulation"><span class="btn-icon">🔄</span> New Simulation</button>
            </div>
        </div>
        
        <div class="fan-stack" id="data-stack">
            <button class="fan-top" title="Data"><span class="btn-icon">💾</span><span class="btn-label">Data</span></button>
            <div class="fan-options">
                <button class="fan-option" id="save-preset" title="Save"><span class="btn-icon">💾</span> Save</button>
                <button class="fan-option" id="load-preset" title="Load" disabled><span class="btn-icon">📂</span> Load</button>
            </div>
        </div>
        
        <button id="fullscreen-btn" title="Fullscreen"><span class="btn-icon">⛶</span><span class="btn-label">Full</span></button>
    </div>
</div>

    
    <!-- Settings Panel -->
    <div id="settings-panel">
        <div class="settings-section">
            <h3>Parameters</h3>
            <div class="slider-container">
                <div class="slider-label">r_max:</div>
                <input type="range" id="rMaxSlider" min="40" max="200" value="120">
                <div class="slider-value" id="rMaxValue">120</div>
            </div>
            <div class="slider-container">
                <div class="slider-label">r_min:</div>
                <input type="range" id="rMinSlider" min="5" max="40" value="20">
                <div class="slider-value" id="rMinValue">20</div>
            </div>
            <div class="slider-container">
                <div class="slider-label">Velocity Dampening:</div>
                <input type="range" id="dampeningSlider" min="70" max="95" value="85" step="1">
                <div class="slider-value" id="dampeningValue">0.85</div>
            </div>
            <div class="slider-container">
                <div class="slider-label">Force Scale:</div>
                <input type="range" id="forceScaleSlider" min="10" max="200" value="50" step="1">
                <div class="slider-value" id="forceScaleValue">0.5</div>
            </div>
        </div>
    </div>
    <script>
        // === Configuration ===
        const speciesCount = 6;
        const particlesPerSpecies = 80;
        let rMax = 120;
        let rMin = 20;
        let velocityDampening = 0.85;
        let forceScale = 0.5;
        
        // Particle colors for each species
        const colors = [
            '#ff0000', // red
            '#00ffff', // cyan
            '#ffff00', // yellow
            '#ff00ff', // magenta
            '#00ff00', // lime
            '#ffa500'  // orange
        ];
        const speciesEnabled = [true, true, true, true, true, true];

        // Canvas and context
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Resize canvas to fit window
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', resizeCanvas);
        resizeCanvas();
        
        // Particle class
        class Particle {
            constructor(x, y, species) {
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.species = species;
            }
        }
        
        // Particles array
        let particles = [];
        
        // Attraction matrix (speciesCount x speciesCount)
        let matrix = [];
        
        // Spatial hash grid (reused each frame)
        let grid = {};
        
        /**
         * Initialize simulation with random particles and matrix
         */
        function init() {
            // Create particles
            particles = [];
            for (let s = 0; s < speciesCount; s++) {
                for (let i = 0; i < particlesPerSpecies; i++) {
                    const x = Math.random() * canvas.width;
                    const y = Math.random() * canvas.height;
                    particles.push(new Particle(x, y, s));
                }
            }
            
            // Initialize random attraction matrix
            randomizeMatrix();
        }
        
        /**
         * Randomize attraction matrix with values between -1 and 1
         */
        function randomizeMatrix() {
            matrix = [];
            for (let i = 0; i < speciesCount; i++) {
                const row = [];
                for (let j = 0; j < speciesCount; j++) {
                    // Random value between -1 and 1
                    row.push(Math.random() * 2 - 1);
                }
                matrix.push(row);
            }
            updateLegend();
        }
        
        // Update species fan options
        function updateLegend() {
            const speciesDotsDiv = document.getElementById('species-dots');
            speciesDotsDiv.innerHTML = '';
            const speciesNames = ['Red', 'Cyan', 'Yellow', 'Magenta', 'Green', 'Orange'];
            colors.forEach((color, index) => {
                const btn = document.createElement('button');
                btn.className = 'fan-option species-option' + (speciesEnabled[index] ? '' : ' species-off-btn');
                btn.title = speciesNames[index] || `Species ${index + 1}`;

                const dot = document.createElement('span');
                dot.className = 'species-dot-fan' + (speciesEnabled[index] ? '' : ' species-off');
                dot.style.backgroundColor = color;

                const label = document.createElement('span');
                label.textContent = speciesNames[index] || `Species ${index + 1}`;
                label.style.opacity = speciesEnabled[index] ? '1' : '0.4';

                btn.appendChild(dot);
                btn.appendChild(label);

                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    speciesEnabled[index] = !speciesEnabled[index];
                    updateLegend();
                    // Keep the fan open after toggling
                    document.getElementById('species-stack').classList.add('open');
                });

                speciesDotsDiv.appendChild(btn);
            });
        }
                
        /**
         * Calculate force between two particles based on attraction matrix and distance
         * @param {Particle} p1 - First particle
         * @param {Particle} p2 - Second particle
         * @returns {{fx: number, fy: number}} Force vector components
         */
        function calculateForce(p1, p2) {
            let dx = p2.x - p1.x;
            let dy = p2.y - p1.y;
            
            // Wrap-around distance
            const wrappedDx = ((dx + canvas.width/2) % canvas.width) - canvas.width/2;
            const wrappedDy = ((dy + canvas.height/2) % canvas.height) - canvas.height/2;
            dx = wrappedDx;
            dy = wrappedDy;
            
            const distance = Math.sqrt(dx*dx + dy*dy);
            
            if (distance === 0) return { fx: 0, fy: 0 };
            
            let force = 0;
            if (distance < rMin) {
                // Always repel at close range
                force = -1;
            } else if (distance < rMax) {
                // Apply matrix force with smooth falloff
                const falloff = (rMax - distance) / (rMax - rMin);
                force = matrix[p1.species][p2.species] * falloff;
            }
            // Else force remains 0
            
            const fx = force * dx / distance * forceScale;
            const fy = force * dy / distance * forceScale;
            return { fx, fy };
        }
        
        /**
         * Update particle positions and velocities using spatial hashing for neighbor lookup
         */
        function update() {
            // Reset forces
            particles.forEach(p => {
                p.fx = 0;
                p.fy = 0;
            });
            
            // Spatial hashing for O(n) neighbor lookup
            const cellSize = rMax;
            
            // Clear grid instead of creating new object
            for (const key in grid) delete grid[key];
            
            // Build spatial hash grid
            particles.forEach((p, index) => {
                const cellX = (p.x / cellSize) | 0;
                const cellY = (p.y / cellSize) | 0;
                const key = `${cellX},${cellY}`;
                if (!grid[key]) grid[key] = [];
                grid[key].push(index);
            });
            
            // Calculate forces using spatial hash with wrap-around
            particles.forEach((p, i) => {
                const cellX = (p.x / cellSize) | 0;
                const cellY = (p.y / cellSize) | 0;
                
                // Check this cell and all 8 neighbors
                for (let dx = -1; dx <= 1; dx++) {
                    for (let dy = -1; dy <= 1; dy++) {
                        let neighborCellX = cellX + dx;
                        let neighborCellY = cellY + dy;
                        
                        // Handle wrap-around for spatial hash
                        // If particle is within rMax of edge, also check wrapped cells
                        const wrapOffsetX = (p.x < rMax) ? -Math.ceil(canvas.width / cellSize) : 
                                          (p.x > canvas.width - rMax) ? Math.ceil(canvas.width / cellSize) : 0;
                        const wrapOffsetY = (p.y < rMax) ? -Math.ceil(canvas.height / cellSize) : 
                                          (p.y > canvas.height - rMax) ? Math.ceil(canvas.height / cellSize) : 0;
                        
                        // Check normal neighbor
                        const key = `${neighborCellX},${neighborCellY}`;
                        if (grid[key]) {
                            grid[key].forEach(j => {
                                if (i !== j) { // Don't check particle against itself
                                    const force = calculateForce(p, particles[j]);
                                    p.fx += force.fx;
                                    p.fy += force.fy;
                                }
                            });
                        }
                        
                        // Check wrapped neighbors if needed
                        if (wrapOffsetX !== 0 || wrapOffsetY !== 0) {
                            const wrappedCellX = neighborCellX + wrapOffsetX;
                            const wrappedCellY = neighborCellY + wrapOffsetY;
                            const wrappedKey = `${wrappedCellX},${wrappedCellY}`;
                            if (grid[wrappedKey]) {
                                grid[wrappedKey].forEach(j => {
                                    if (i !== j) { // Don't check particle against itself
                                        const force = calculateForce(p, particles[j]);
                                        p.fx += force.fx;
                                        p.fy += force.fy;
                                    }
                                });
                            }
                        }
                    }
                }
            });
            
            // Update velocities and positions
            particles.forEach(p => {
                // Apply velocity dampening
                p.vx = (p.vx + p.fx) * velocityDampening;
                p.vy = (p.vy + p.fy) * velocityDampening;
                
                // Update position
                p.x += p.vx;
                p.y += p.vy;
                
                // Wrap-around boundaries
                if (p.x < 0) p.x += canvas.width;
                if (p.x >= canvas.width) p.x -= canvas.width;
                if (p.y < 0) p.y += canvas.height;
                if (p.y >= canvas.height) p.y -= canvas.height;
            });
        }
        
        /**
         * Render particles to canvas with trailing effect
         */
        function render() {
            // Clear with trailing effect
            ctx.fillStyle = 'rgba(0,0,0,0.15)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
             // Draw particles
             particles.forEach(p => {
                 if (!speciesEnabled[p.species]) return;
                 ctx.beginPath();
                 ctx.arc(p.x, p.y, 5, 0, Math.PI * 2);
                 ctx.fillStyle = colors[p.species];
                 ctx.fill();
             });
        }
        
        /**
         * Main animation loop
         * @param {number} timestamp - Timestamp from requestAnimationFrame
         */
let lastTime = 0;
        function loop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            const delta = timestamp - lastTime;
            lastTime = timestamp;
         
        update();
        render();
        
        requestAnimationFrame(loop);
        }
        
        // Event listeners
        document.getElementById('randomize').addEventListener('click', randomizeMatrix);
        document.getElementById('reset').addEventListener('click', init);
        
        // Touch handling for canvas
        let lastTap = 0;
        canvas.addEventListener('touchstart', function(e) {
            // Prevent scrolling
            e.preventDefault();
            
            const now = Date.now();
            const timeSinceLastTap = now - lastTap;
            
            if (timeSinceLastTap < 300) {
                // Double tap
                init();
                lastTap = 0;
            } else {
                // Single tap
                randomizeMatrix();
                lastTap = now;
            }
        }, { passive: false });
        
        // Settings panel toggle
        document.getElementById('settings-toggle').addEventListener('click', function() {
            const settingsPanel = document.getElementById('settings-panel');
            const uiBar = document.getElementById('ui');
            settingsPanel.classList.toggle('active');
            
            // Position settings panel above UI bar when active
            if (settingsPanel.classList.contains('active')) {
                settingsPanel.style.bottom = `${uiBar.offsetHeight}px`;
            } else {
                settingsPanel.style.bottom = 'auto';
            }
        });
        
        // Parameter sliders
        const rMaxSlider = document.getElementById('rMaxSlider');
        const rMaxValue = document.getElementById('rMaxValue');
        rMaxSlider.addEventListener('input', function() {
            rMax = parseInt(this.value);
            // Ensure rMax is always >= rMin + 10
            if (rMax < rMin + 10) {
                rMax = rMin + 10;
                this.value = rMax;
            }
            rMaxValue.textContent = rMax;
        });
        
        const rMinSlider = document.getElementById('rMinSlider');
        const rMinValue = document.getElementById('rMinValue');
        rMinSlider.addEventListener('input', function() {
            rMin = parseInt(this.value);
            // Ensure rMax is always >= rMin + 10
            if (rMax < rMin + 10) {
                rMax = rMin + 10;
                rMaxSlider.value = rMax;
                rMaxValue.textContent = rMax;
            }
            rMinValue.textContent = rMin;
        });
        
        const dampeningSlider = document.getElementById('dampeningSlider');
        const dampeningValue = document.getElementById('dampeningValue');
        dampeningSlider.addEventListener('input', function() {
            velocityDampening = parseInt(this.value) / 100;
            dampeningValue.textContent = velocityDampening.toFixed(2);
        });
        
        const forceScaleSlider = document.getElementById('forceScaleSlider');
        const forceScaleValue = document.getElementById('forceScaleValue');
        forceScaleSlider.addEventListener('input', function() {
            forceScale = parseInt(this.value) / 100;
            forceScaleValue.textContent = forceScale.toFixed(2);
        });
        
        // Save/Load presets
        const savePresetBtn = document.getElementById('save-preset');
        const loadPresetBtn = document.getElementById('load-preset');
        
            savePresetBtn.addEventListener('click', function() {
                const preset = {
                    matrix: matrix,
                    rMax: rMax,
                    rMin: rMin,
                    velocityDampening: velocityDampening,
                    forceScale: forceScale
                };
                localStorage.setItem('particlelife-preset', JSON.stringify(preset));
                loadPresetBtn.disabled = false;
                // Visual feedback
                const saveLabel = savePresetBtn.querySelector('.btn-label');
                const originalLabel = saveLabel.textContent;
                saveLabel.textContent = 'Saved!';
                setTimeout(() => { saveLabel.textContent = originalLabel; }, 1000);
            });
        
        loadPresetBtn.addEventListener('click', function() {
            const saved = localStorage.getItem('particlelife-preset');
            if (saved) {
                const preset = JSON.parse(saved);
                matrix = preset.matrix;
                rMax = preset.rMax;
                rMin = preset.rMin;
                velocityDampening = preset.velocityDampening;
                forceScale = preset.forceScale;
                
                // Update slider positions to match loaded values
                rMaxSlider.value = rMax;
                rMaxValue.textContent = rMax;
                rMinSlider.value = rMin;
                rMinValue.textContent = rMin;
                dampeningSlider.value = Math.round(velocityDampening * 100);
                dampeningValue.textContent = velocityDampening.toFixed(2);
                forceScaleSlider.value = Math.round(forceScale * 100);
                forceScaleValue.textContent = forceScale.toFixed(2);
                
                updateLegend();
                // Visual feedback
                const loadLabel = loadPresetBtn.querySelector('.btn-label');
                const originalLoadLabel = loadLabel.textContent;
                loadLabel.textContent = 'Loaded!';
                setTimeout(() => {
                    loadLabel.textContent = originalLoadLabel;
                }, 1000);
            }
        });
        
        // Check for saved preset on load
        if (localStorage.getItem('particlelife-preset')) {
            loadPresetBtn.disabled = false;
        }
        
        // Initialize species dots
        updateLegend();
        
        // Fan stack functionality
        document.addEventListener('click', function(e) {
            // Close all fan stacks if clicking outside
            const fanStacks = document.querySelectorAll('.fan-stack');
            fanStacks.forEach(stack => {
                if (!stack.contains(e.target)) {
                    stack.classList.remove('open');
                }
            });
        });
        
        // Fan stack toggle
        document.querySelectorAll('.fan-top').forEach(button => {
            button.addEventListener('click', function(e) {
                e.stopPropagation(); // Prevent closing when clicking the button
                const stack = this.parentElement;
                stack.classList.toggle('open');
            });
        });
        
        // Fan option clicks
        document.querySelectorAll('.fan-option').forEach(button => {
            button.addEventListener('click', function(e) {
                e.stopPropagation(); // Prevent closing when clicking the option
                const stack = this.closest('.fan-stack');
                stack.classList.remove('open');
            });
        });
        
        // Hide fullscreen button if the API isn't available (iOS Safari)
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        if (!document.documentElement.requestFullscreen && !document.documentElement.webkitRequestFullscreen) {
            fullscreenBtn.style.display = 'none';
        }
        fullscreenBtn.addEventListener('click', function() {
            if (!document.fullscreenElement) {
                // Try to request fullscreen
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen();
                } else if (document.documentElement.webkitRequestFullscreen) { // Safari
                    document.documentElement.webkitRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) { // Safari
                    document.webkitExitFullscreen();
                }
            }
        });
        
        // Hide UI when in fullscreen (except for a small button to show it)
        document.addEventListener('fullscreenchange', function() {
            const ui = document.getElementById('ui');
            if (document.fullscreenElement) {
                ui.style.opacity = '0';
                // Show a small button to restore UI
                if (!document.getElementById('show-ui-btn')) {
                    const showBtn = document.createElement('button');
                    showBtn.id = 'show-ui-btn';
                    showBtn.textContent = '☰';
                    showBtn.style.position = 'fixed';
                    showBtn.style.top = '10px';
                    showBtn.style.left = '10px';
                    showBtn.style.background = 'rgba(0,0,0,0.5)';
                    showBtn.style.color = 'white';
                    showBtn.style.border = 'none';
                    showBtn.style.borderRadius = '5px';
                    showBtn.style.padding = '10px';
                    showBtn.style.fontSize = '24px';
                    showBtn.style.zIndex = '1000';
                    showBtn.addEventListener('click', function() {
                        ui.style.opacity = '1';
                        this.remove();
                    });
                    document.body.appendChild(showBtn);
                }
            } else {
                ui.style.opacity = '1';
                // Remove the show UI button if it exists
                const showBtn = document.getElementById('show-ui-btn');
                if (showBtn) {
                    showBtn.remove();
                }
            }
        });
        
        // Also handle webkitfullscreenchange for Safari
        document.addEventListener('webkitfullscreenchange', function() {
            const ui = document.getElementById('ui');
            if (document.webkitIsFullScreen) {
                ui.style.opacity = '0';
            } else {
                ui.style.opacity = '1';
            }
        });
        
        // Start simulation
        init();
        requestAnimationFrame(loop);
    </script>
</body>
